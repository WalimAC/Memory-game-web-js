<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Memory</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" type="module"></script>
</head>
<body>

<div class="setup-form">
  <form class="game-form">
    <h1>Memory Game</h1>

    <div class="form-container-inner">
      <div class="form-group">
        <label for="pseudo">👾 | Pseudo :</label>
        <input type="text" id="pseudo" name="pseudo" required placeholder="Votre pseudo..." autocomplete="off">
      </div>

      <div class="form-group">
        <label for="game-mode">🎮 | Mode de jeu :</label>
        <select id="game-mode" name="mode" required>
          <option value="classic" selected>Classique (Normal)</option>
          <option value="survie">Mode Survie (⏱️ erreurs = -2s / paires = +3s)</option>
          <option value="flash">Mode Flash (⚡ Révélation 2s au début)</option>
          <option value="level">Mode Niveaux (🏆 Difficulté progressive)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="difficulty">🎯 | Nombre de paires :</label>
        <select id="difficulty" name="difficulty" required>
          <option value="4">4 paires</option>
          <option value="5">5 paires</option>
          <option value="6">6 paires</option>
          <option value="8">8 paires</option>
        </select>
      </div>

      <div class="form-group">
        <label for="game-duration">⏱️ | Temps de jeu :</label>
        <select id="game-duration" name="duration" required>
          <option value="30">30 secondes (Rapide)</option>
          <option value="60" selected>60 secondes (Normal)</option>
          <option value="90">90 secondes (Tranquille)</option>
          <option value="120">120 secondes (Infini)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="collection">🖼️ | Collection d'images :</label>
        <select id="collection" name="collection" required>
          <option value="animals">Animaux</option>
          <option value="fruits">Fruits</option>
          <option value="cars">Voitures</option>
        </select>
      </div>
    </div>

    <button type="submit">Démarrer la partie</button>
  </form>
</div>

<div class="game-area hidden">

  <div class="game-sidebar">
    <div id="level-zone" class="hidden">Niveau : <br><span id="current-level">1</span></div>

    <div class="timer-zone">Temps restant : <br><span id="chrono">60</span>s</div>

    <div class="combo-zone">Combo : <br><span id="combo-value">x0</span></div>

    <button id="btn-joker" class="btn-arcade-green">👁️ Joker (1)</button>

    <button id="btn-abandon">Abandonner</button>
  </div>

  <div class="game-main">
    <div id="game-message" class="game-message-hidden"></div>
    <div class="game-board"></div>

    <div id="end-game-screen" class="hidden">
      <h2 id="end-title">Victoire !</h2>
      <p id="end-message">Félicitations, tu as trouvé toutes les paires !</p>

      <div class="end-buttons-container">
        <button id="btn-replay">🎮 Rejouer</button>
        <button id="btn-restart">🏠 Menu</button>
      </div>
    </div>

    <div id="paypal-popup" class="arcade-popup hidden">
      <div class="paypal-header-container">
        <span class="paypal-arcade-icon">Ⓟ</span>
      </div>
      <h2 class="popup-title">MAIS WOWOOOOOOOOWW !</h2>
      <p class="popup-message">À ce stade là x4 COMMMMMMBOOOOO tu devrais devenir champion ! J'investis alors en toi ! Met ton paypal</p>

      <div class="form-group">
        <input type="email" id="paypal-email" placeholder="votre-adresse@paypal.com" autocomplete="off">
      </div>

      <div class="end-buttons-container">
        <button id="btn-resume-game">▶️ Continuer la partie</button>
      </div>
    </div>

<audio id="bg-music" src="assets/sons/music.mp3" loop></audio>

</body>
</html>
